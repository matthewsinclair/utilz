name: syncz
version: 2.0.0
utilz_version: "^2.0.0"
description: Simple directory-to-directory syncer
author: Matthew Sinclair

dependencies:
  - name: unison
    required: false
    install: brew install unison
    purpose: Bidirectional sync engine with state tracking (preferred)
  - name: rsync
    required: true
    install: brew install rsync
    purpose: Unidirectional sync engine and bidi fallback

integration:
  input: path
  output: buffer
  flags: []
